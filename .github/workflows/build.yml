name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            apt-get update -qq && apt-get install -y -qq gradle 2>/dev/null
            gradle wrapper --gradle-version 8.5
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sd-formatter-debug
          path: app/build/outputs/apk/debug/*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: sd-formatter-debug
          path: artifacts/

      - name: Generate release notes
        id: notes
        run: |
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          {
            echo "notes<<CHANGELOG"
            echo "## SDFormatter ${{ github.ref_name }}"
            echo ""
            echo "Android app to format SD cards via USB OTG to FAT or FAT32."
            echo ""
            if [ -n "$PREV" ]; then
              echo "### Changes since $PREV"
              git log --oneline "$PREV..HEAD" --pretty=format:'- %s'
            else
              echo "### Changes"
              git log --oneline --pretty=format:'- %s'
            fi
            echo ""
            echo "CHANGELOG"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SDFormatter ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: artifacts/*.apk
